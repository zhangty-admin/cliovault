<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ClipVault 图标预览</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 48px 24px;
    font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 30% 0%, #1a1c2e 0%, #0c0c12 60%);
    color: #e8e9ef; min-height: 100vh;
  }
  h1 { font-weight: 600; letter-spacing: .5px; margin: 0 0 4px; }
  .sub { color: #8b8d98; margin: 0 0 36px; font-size: 14px; }
  .section { margin-bottom: 44px; }
  .section h2 { font-size: 15px; color: #aeb1bd; font-weight: 600; margin: 0 0 16px; letter-spacing: .6px; text-transform: uppercase; }
  .hero {
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    padding: 28px; border-radius: 20px;
    background: linear-gradient(160deg, rgba(76,110,245,.12), rgba(150,90,255,.06));
    border: 1px solid rgba(255,255,255,.06);
  }
  .hero img { width: 220px; height: 220px; border-radius: 48px; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
  .hero .meta { font-size: 14px; line-height: 1.8; color: #c4c6d2; }
  .hero .meta b { color: #f0f1f5; }
  .checkerboard {
    display: inline-grid; grid-template-columns: repeat(2, 16px); gap: 0;
    width: 220px; height: 220px; border-radius: 48px; overflow: hidden;
    background:
      linear-gradient(45deg, #2a2b33 25%, transparent 25%, transparent 75%, #2a2b33 75%) 0 0/32px 32px,
      linear-gradient(45deg, #2a2b33 25%, transparent 25%, transparent 75%, #2a2b33 75%) 16px 16px/32px 32px,
      #3a3b44;
    -webkit-mask: radial-gradient(closest-side, #000 99%, transparent);
  }
  .row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
  .tile { text-align: center; }
  .tile img { display: block; margin: 0 auto; image-rendering: -webkit-optimize-contrast; }
  .tile .lbl { font-size: 12px; color: #8b8d98; margin-top: 8px; }
  .panel {
    padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,.06);
  }
  .panel.light { background: #eef0f5; }
  .panel.dark { background: #1e1f28; }
  code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
  <h1>ClipVault 应用图标</h1>
  <p class="sub">玻璃拟态 (Glassmorphism) · 层叠卡片（立体景深） · 品牌色 靛蓝 #4C6EF5 → 紫罗兰</p>

  <div class="section">
    <div class="hero">
      <img src="../src/ClipVault/Assets/app_icon_1024.png" alt="主图标">
      <div class="meta">
        <div><b>设计概念：</b>三张半透明磨砂玻璃卡片错位层叠，营造景深</div>
        <div><b>主色调：</b>靛蓝 → 紫罗兰渐变，霓虹边缘高光</div>
        <div><b>点题元素：</b>前卡顶部剪贴板夹子 + 内容线条</div>
        <div><b>应用场景：</b>exe 图标 / 任务栏 / Alt+Tab / 托盘 / 安装包</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>多尺寸适配（16 ~ 256 px，托盘到大图标）</h2>
    <div class="panel light" style="margin-bottom:16px;">
      <img src="../src/ClipVault/Assets/icon_sizes_light.png" alt="浅色背景下各尺寸" style="max-width:100%;">
    </div>
    <div class="panel dark">
      <img src="../src/ClipVault/Assets/icon_sizes_dark.png" alt="深色背景下各尺寸" style="max-width:100%;">
    </div>
  </div>

  <div class="section">
    <h2>透明背景主图</h2>
    <div class="panel dark">
      <div class="checkerboard"></div>
      <img src="../src/ClipVault/Assets/app_icon_1024.png" width="160" height="160" alt="透明背景" style="vertical-align:middle; margin-left:24px;">
      <span style="vertical-align:middle; color:#8b8d98; font-size:13px; margin-left:12px;">圆角外的区域为透明（squircle 形状）</span>
    </div>
  </div>
</body>
</html>
